<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Nebula Calc - A premium, portfolio-grade dark glassmorphic Calculator Web Application with advanced scientific mode, memory operations, audio feedback, and calculation history.">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/favicon.png">
  
  <!-- Google Fonts - Outfit & Inter for high-end typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  
  <title>  — Premium Glassmorphic Web Calculator</title>
  
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
  <!-- Dynamic Glowing background decorations -->
  <div class="glow-bg-orb orb-1" aria-hidden="true"></div>
  <div class="glow-bg-orb orb-2" aria-hidden="true"></div>
  <div class="glow-bg-orb orb-3" aria-hidden="true"></div>
  <main class="app-container">
    <!-- Calculator Card -->
    <section class="calculator-card" role="application" aria-label="Nebula Calculator">
      
      <!-- Top Control Header -->
      <header class="calc-header">
        <div class="logo">
          <span class="logo-accent">CALCULATOR</span><span></span>
        </div>
        
        <div class="header-controls">
          <!-- Scientific Toggle -->
          <button id="toggle-sci-btn" class="icon-btn" aria-label="Toggle Scientific Mode" title="Scientific Mode (M)">
            <span class="btn-label-text">SCI</span>
          </button>
          
          <!-- Sound Toggle -->
          <button id="toggle-sound-btn" class="icon-btn active" aria-label="Toggle Sound Feedback" title="Sound Feedback (S)">
            <!-- Speaker Icon -->
            <svg class="icon icon-sound-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            </svg>
            <svg class="icon icon-sound-off hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              <line x1="23" y1="9" x2="17" y2="15"></line>
              <line x1="17" y1="9" x2="23" y2="15"></line>
            </svg>
          </button>
          
          <!-- Theme Toggle -->
          <button id="toggle-theme-btn" class="icon-btn" aria-label="Toggle Theme" title="Theme Toggle (T)">
            <!-- Moon (Dark Theme Icon) -->
            <svg class="icon icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            <!-- Sun (Light Theme Icon) -->
            <svg class="icon icon-sun hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
          </button>
          
          <!-- History Toggle -->
          <button id="toggle-history-btn" class="icon-btn" aria-label="Toggle History Panel" title="Calculation History (H)">
            <!-- Clock Icon -->
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
          </button>
        </div>
      </header>
      
      <!-- Calculator Display Screen -->
      <section class="calc-screen" aria-label="Calculator Screen">
        <!-- Display Header Indicators -->
        <div class="screen-indicators">
          <span id="indicator-memory" class="indicator hidden" title="Memory Storage Active">M</span>
          <span id="indicator-angle" class="indicator hidden" title="Trigonometric Angle Mode">DEG</span>
          <span id="indicator-mode" class="indicator" title="Current Mode">STANDARD</span>
        </div>
        
        <!-- Expression Output -->
        <div class="expression-area-wrapper">
          <div id="expression-display" class="expression-display" tabindex="0" aria-label="Mathematical Expression" aria-live="polite"></div>
        </div>
        
        <!-- Primary Output/Result -->
        <div class="result-area-wrapper">
          <div id="result-display" class="result-display" tabindex="0" aria-label="Result Value" aria-live="polite">0</div>
          
          <!-- Quick actions on result -->
          <div class="result-actions">
            <!-- Copy Action -->
            <button id="copy-result-btn" class="action-mini-btn" aria-label="Copy Result" title="Copy Result">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
              <span id="copy-toast" class="tooltip hidden">Copied!</span>
            </button>
          </div>
        </div>
      </section>
      
      <!-- Interactive Grid Workspace -->
      <section class="workspace-grid-container">
        
        <!-- Scientific Pad Panel (Hidden in standard mode via CSS grid classes) -->
        <div id="scientific-pad" class="keypad scientific-grid hidden" aria-label="Scientific Functions">
          <!-- Deg/Rad toggle -->
          <button class="key key-sci" data-action="toggle-angle" aria-label="Toggle Degrees or Radians">rad/deg</button>
          <button class="key key-sci" data-action="sin" aria-label="Sine">sin</button>
          <button class="key key-sci" data-action="cos" aria-label="Cosine">cos</button>
          <button class="key key-sci" data-action="tan" aria-label="Tangent">tan</button>
          <button class="key key-sci" data-action="asin" aria-label="Arc Sine">sin⁻¹</button>
          <button class="key key-sci" data-action="acos" aria-label="Arc Cosine">cos⁻¹</button>
          <button class="key key-sci" data-action="atan" aria-label="Arc Tangent">tan⁻¹</button>
          <button class="key key-sci" data-action="pi" aria-label="Pi Constant">π</button>
          <button class="key key-sci" data-action="ln" aria-label="Natural Logarithm">ln</button>
          <button class="key key-sci" data-action="log" aria-label="Logarithm base 10">log</button>
          <button class="key key-sci" data-action="e" aria-label="Euler constant">e</button>
          <button class="key key-sci" data-action="fact" aria-label="Factorial">x!</button>
          <button class="key key-sci" data-action="pow" aria-label="Raise to power">xʸ</button>
          <button class="key key-sci" data-action="sqrt" aria-label="Square Root">√</button>
          <button class="key key-sci" data-action="cbrt" aria-label="Cube Root">∛</button>
          <button class="key key-sci" data-action="square" aria-label="Square">x²</button>
          <button class="key key-sci" data-action="cube" aria-label="Cube">x³</button>
          <button class="key key-sci" data-action="open-paren" aria-label="Open Parenthesis">(</button>
          <button class="key key-sci" data-action="close-paren" aria-label="Close Parenthesis">)</button>
          <button class="key key-sci" data-action="exp" aria-label="Exponent notation">Exp</button>
        </div>
        <!-- Standard Pad Panel -->
        <div class="keypad standard-grid" aria-label="Standard Keys">
          <!-- Memory Function Row (Spans full standard grid columns) -->
          <div class="memory-row">
            <button class="key key-mem" data-action="mc" aria-label="Clear Memory" title="Memory Clear">MC</button>
            <button class="key key-mem" data-action="mr" aria-label="Recall Memory" title="Memory Recall">MR</button>
            <button class="key key-mem" data-action="m-plus" aria-label="Add to Memory" title="Memory Add">M+</button>
            <button class="key key-mem" data-action="m-minus" aria-label="Subtract from Memory" title="Memory Subtract">M-</button>
          </div>
          <!-- Basic keypad grid keys -->
          <!-- Row 1 -->
          <button class="key key-danger" data-action="clear" aria-label="Clear Display" title="All Clear (Escape)">AC</button>
          <button class="key key-special" data-action="backspace" aria-label="Backspace Last Entry" title="Delete (Backspace)">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path>
              <line x1="18" y1="9" x2="12" y2="15"></line>
              <line x1="12" y1="9" x2="18" y2="15"></line>
            </svg>
          </button>
          <button class="key key-special" data-action="percent" aria-label="Percentage">%</button>
          <button class="key key-operator" data-action="div" aria-label="Division">/</button>
          <!-- Row 2 -->
          <button class="key key-num" data-val="7" aria-label="Digit 7">7</button>
          <button class="key key-num" data-val="8" aria-label="Digit 8">8</button>
          <button class="key key-num" data-val="9" aria-label="Digit 9">9</button>
          <button class="key key-operator" data-action="mul" aria-label="Multiplication">×</button>
          <!-- Row 3 -->
          <button class="key key-num" data-val="4" aria-label="Digit 4">4</button>
          <button class="key key-num" data-val="5" aria-label="Digit 5">5</button>
          <button class="key key-num" data-val="6" aria-label="Digit 6">6</button>
          <button class="key key-operator" data-action="sub" aria-label="Subtraction">−</button>
          <!-- Row 4 -->
          <button class="key key-num" data-val="1" aria-label="Digit 1">1</button>
          <button class="key key-num" data-val="2" aria-label="Digit 2">2</button>
          <button class="key key-num" data-val="3" aria-label="Digit 3">3</button>
          <button class="key key-operator" data-action="add" aria-label="Addition">+</button>
          <!-- Row 5 -->
          <button class="key key-special" data-action="negate" aria-label="Toggle Positive/Negative">±</button>
          <button class="key key-num" data-val="0" aria-label="Digit 0">0</button>
          <button class="key key-special" data-action="decimal" aria-label="Decimal point">.</button>
          <button class="key key-primary" data-action="evaluate" aria-label="Evaluate Expression equals" title="Equals (Enter)">=</button>
        </div>
      </section>
    </section>
    <!-- Slide-out Calculation History Panel -->
    <aside id="history-sidebar" class="history-sidebar hidden" aria-label="Calculation History Panel">
      <header class="history-header">
        <h3>History</h3>
        <div class="history-header-actions">
          <button id="clear-history-btn" class="text-action-btn" aria-label="Clear All History">Clear</button>
          <button id="close-history-btn" class="icon-btn-mini" aria-label="Close History Panel">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
      </header>
      
      <div id="history-list" class="history-list" role="log" aria-live="polite">
        <!-- History items will be injected here by JS -->
        <div class="empty-history-msg">No history yet</div>
      </div>
    </aside>
  </main>
  <footer class="app-footer">
    <p>Nebula Calc &copy; 2026. Made with vanilla HTML, CSS, and JS. Suitable for internship portfolios.</p>
  </footer>
  <!-- Sound status alert for screen readers -->
  <div class="sr-only" role="status" aria-live="assertive" id="sr-status-announcer"></div>
  <!-- JavaScript Entry -->
  <script src="script.js"></script>
</body>
</html>
